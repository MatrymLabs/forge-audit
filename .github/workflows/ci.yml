name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # No ANTHROPIC_API_KEY, no GitHub token: the RepoProbe and Runner seams are
      # mocked in tests, so the suite never touches the network or a real tool.
      - name: Run the gates
        run: make check

      - name: Coverage gate
        run: make coverage

      - name: Static security scan
        run: bandit -c pyproject.toml -r src -q

      - name: Secret scan
        run: make secrets

      # SBOM (SSDF supply-chain evidence): generate a CycloneDX bill of materials and
      # keep it as a build artifact. Reproducible from this commit; non-blocking.
      - name: Software bill of materials (SBOM)
        run: make sbom
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: warn

      - name: Dependency CVE audit
        run: make audit
        continue-on-error: true

      # Dogfood: prove the tool RUNS and emits a valid JSON scorecard. The pipe makes
      # the step gate on "valid scorecard produced," not on the verdict — a young solo
      # repo is legitimately `watchlist` (one workflow, no merged-PR loop), and that must
      # not fail its own build. A crash mid-output makes the JSON parse fail loud.
      - name: Dogfood — the tool audits itself and emits a valid scorecard
        run: |
          { forge-audit --path . --stage entry --json || true; } \
            | python -c "import json,sys; c=json.load(sys.stdin); print('valid scorecard —', c['verdict'])"
