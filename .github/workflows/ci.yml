name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # No ANTHROPIC_API_KEY, no GitHub token: the RepoProbe and Runner seams are
      # mocked in tests, so the suite never touches the network or a real tool.
      - name: Run the gates
        run: make check

      - name: Coverage gate
        run: make coverage

      - name: Static security scan
        run: bandit -c pyproject.toml -r src -q

      - name: Dependency CVE audit
        run: make audit
        continue-on-error: true

      - name: Dogfood — audit this repo with the tool itself
        run: forge-audit --path . --stage intermediate --json
