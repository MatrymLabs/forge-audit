# CodeQL -- GitHub-native static analysis (SAST) for the code AND the workflows.
# Complements bandit (fast, local, in CI) with GitHub's deeper semantic scan; results
# land in the Security tab. Public repos get CodeQL for free.
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 6 * * 1"  # weekly sweep (Monday), catches newly-published queries

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, actions]  # the languages GitHub detected for this repo
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      # Python is interpreted -- no build step needed; CodeQL analyzes the source directly.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
